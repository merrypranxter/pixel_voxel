id: pxv.technique.palette_ramp_hueshift.v1
type: technique
name: Palette Ramp with Hue Shifting
aliases: [hue shift ramp, hue-shifted shading, color ramp, pixel shading ramp]
summary: "Shading technique where shadow and highlight ramp steps shift hue in addition to changing value."
description: |
  Plain value-ramp shading (just darkening a color) produces muddy, lifeless results.
  Hue shifting adds life: in a good pixel art ramp, shadows shift hue toward cooler
  blues/purples and highlights shift toward warmer yellows/creams. Saturation typically
  peaks in the midtone range and decreases in both extremes (especially in highlights).

  The technique is standard in 16-bit era pixel art and modern clean pixel art.
  Each material gets its own ramp of typically 4–8 colors, designed with:
    1. Shadow: darker, shifted toward cool (H -15°…-30°), lower saturation.
    2. Midtone: the base color, highest saturation.
    3. Highlight: lighter, shifted toward warm (H +10°…+20°), lower saturation.

  Ramps should also respect hue harmony with adjacent materials (skin tone ramp,
  cloth ramp, metal ramp should all feel like they live in the same light).
tags:
  medium: [pixel]
  lighting: [ramp]
  palette: [ramps, limited, extended]
  era: [16bit, modern_retro, contemporary]
parameters:
  - name: steps
    type: int
    default: 5
    range: [3, 12]
    description: "Number of colors in the ramp."
  - name: shadow_hue_shift_deg
    type: float
    default: -20.0
    range: [-45.0, 0.0]
    description: "Hue rotation for the darkest ramp step (negative = cooler)."
  - name: highlight_hue_shift_deg
    type: float
    default: 15.0
    range: [0.0, 45.0]
    description: "Hue rotation for the lightest ramp step (positive = warmer)."
constraints:
  do:
    - "Design ramps in HSV space; shift H, then adjust S and V."
    - "Keep the number of ramp steps consistent across all materials in a piece."
    - "Make each ramp step a usable, intentional palette entry — no duplicate colors."
  avoid:
    - "Pillow shading: darkening all edges uniformly regardless of light direction."
    - "Shifting hue the same direction for both shadows AND highlights."
compat:
  works_with:
    - pxv.style.pixel_16bit.v1
    - pxv.palette.endesga_32.v1
    - pxv.palette.apollo.v1
outputs:
  - kind: shader_hint
    value: "In HSV: shadow shifts H by -20deg, S by -0.1, V by -0.35; highlight shifts H by +15deg, S by -0.15, V by +0.35"
provenance:
  sources:
    - kind: note
      value: "Curated by merrypranxter"
    - kind: url
      value: "https://lospec.com/articles/pixel-art-color-theory/"
version: 1
created_at: "2026-04-10"
