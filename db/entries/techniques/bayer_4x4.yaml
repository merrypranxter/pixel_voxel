id: pxv.technique.bayer_4x4.v1
type: technique
name: Bayer 4×4 Ordered Dithering
aliases: [bayer dither, ordered dither 4x4, threshold matrix]
summary: "Ordered dithering using the 4×4 Bayer threshold matrix to convert continuous tones to limited palettes."
description: |
  Bayer ordered dithering uses a pre-defined threshold matrix (the Bayer matrix) to
  determine whether a given pixel should be the lighter or darker palette color.
  The 4×4 matrix creates a characteristic checkerboard-cross pattern that is very
  recognizable at small sizes but reads as smooth tone at normal viewing distance.

  The 4×4 Bayer matrix (normalized 0–1):
    0.0000  0.5000  0.1250  0.6250
    0.7500  0.2500  0.8750  0.3750
    0.1875  0.6875  0.0625  0.5625
    0.9375  0.4375  0.8125  0.3125

  Steps:
    1. Compute perceived luminance for the pixel.
    2. Look up threshold T = BayerMatrix[y % 4][x % 4].
    3. If luminance > T → assign lighter palette entry; else darker.
    4. For more than 2 colors, quantize luminance to ramp levels first, then
       use dithering at the boundary between ramp steps.
tags:
  medium: [pixel, hybrid]
  texture: [dithering]
  shader_ops: [dither, quantize]
  era: [8bit, 16bit, modern_retro]
parameters:
  - name: matrix_size
    type: enum
    options: [2x2, 4x4, 8x8]
    default: 4x4
    description: "Bayer matrix dimension. Larger = finer pattern, more tones."
  - name: spread
    type: float
    default: 1.0
    range: [0.5, 2.0]
    description: "Multiplier on the threshold spread. <1 = less dither, >1 = more."
compat:
  works_with:
    - pxv.style.ditherpunk.v1
    - pxv.style.gameboy_dmg.v1
    - pxv.shader.ordered_dither.v1
    - pxv.palette.gameboy_dmg_4.v1
outputs:
  - kind: shader_hint
    value: |
      const float bayer4[16] = float[16](
        0.0/16.0,  8.0/16.0,  2.0/16.0, 10.0/16.0,
       12.0/16.0,  4.0/16.0, 14.0/16.0,  6.0/16.0,
        3.0/16.0, 11.0/16.0,  1.0/16.0,  9.0/16.0,
       15.0/16.0,  7.0/16.0, 13.0/16.0,  5.0/16.0
      );
      float threshold = bayer4[(int(fragCoord.y) % 4) * 4 + int(fragCoord.x) % 4];
      float dithered = step(threshold, luminance);
    language: glsl
provenance:
  sources:
    - kind: note
      value: "Curated by merrypranxter"
    - kind: url
      value: "https://en.wikipedia.org/wiki/Ordered_dithering"
version: 1
created_at: "2026-04-10"
