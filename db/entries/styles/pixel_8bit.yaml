id: pxv.style.pixel_8bit.v1
type: style
name: Classic 8-bit Pixel Art
aliases: [8bit, NES-style, retro pixel]
summary: "Hard-limited color pixel art inspired by NES, Game Boy, and early home computer hardware."
description: |
  The archetypal pixel art style defined by strict hardware constraints of 8-bit consoles
  (NES: 54-color master palette, 4 colors per sprite/tile; Game Boy: 4-shade monochrome).
  Work is built tile-by-tile, sprites are small (8×8 to 32×32 px), and every pixel is
  intentional. Anti-aliasing is absent or manual. Dithering is used sparingly because of
  per-line sprite limits on real hardware.

  Key references: Super Mario Bros., Mega Man, Zelda I & II, Game Boy Tetris.
tags:
  medium: [pixel]
  era: [8bit]
  lighting: [ramp, flat]
  palette: [limited, gameboy, cga]
  texture: [none, dithering]
  mood: [nostalgic, playful]
  subject: [character, environment, UI]
constraints:
  do:
    - "Work at native resolution (8×8, 16×16, 32×32 tiles/sprites) and scale up with nearest-neighbor."
    - "Limit colors per sprite/tile to 3–4 + transparency."
    - "Place every pixel with intent — no accidental sub-pixel blends."
  avoid:
    - "Anti-aliased edges or semi-transparent pixels."
    - "Gradients without dithering or explicit ramp steps."
parameters:
  - name: tile_size
    type: int
    default: 16
    range: [8, 64]
    description: "Base tile / sprite size in pixels."
  - name: colors_per_tile
    type: int
    default: 4
    range: [2, 16]
    description: "Hard color limit per tile/sprite, including transparency."
compat:
  works_with:
    - pxv.technique.bayer_4x4.v1
    - pxv.technique.manual_aa.v1
    - pxv.palette.gameboy_dmg_4.v1
    - pxv.shader.pixelate_grid_lock.v1
outputs:
  - kind: prompt_fragment
    value: "classic 8-bit pixel art, NES-era sprites, hard pixel edges, limited 4-color palette, no anti-aliasing"
  - kind: shader_hint
    value: "floor(uv * tileResolution) / tileResolution for stable pixel grid lock"
provenance:
  sources:
    - kind: note
      value: "Curated by merrypranxter"
    - kind: game
      value: "Super Mario Bros. (Nintendo, 1985)"
version: 1
created_at: "2026-04-10"
