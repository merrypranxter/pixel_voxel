id: pxv.palette.endesga_32.v1
type: palette
name: ENDESGA 32
aliases: [endesga32, e32, ende32]
summary: "32-color palette by ENDESGA — warm earthy tones with a full set of skin, nature, and material ramps."
description: |
  One of the most popular palettes on Lospec, designed by ENDESGA. 32 colors organized
  into well-balanced ramps: skin tones, warm earthy browns, natural greens, cool blues,
  grays, and accent reds/oranges. Excellent for character sprites, environments, and UI.
  Very cohesive — mixing colors from different ramps still produces harmonious results.
  Widely used in game jams and indie pixel art games.

  Palette design principles:
  - Hue-shifted ramps throughout (not just pure value changes).
  - 4 skin tone shades from pale to dark.
  - 4 nature greens from deep forest to pale leaf.
  - 4 sky blues.
  - 4 earth/stone grays.
  - Warm accent reds, oranges, yellows.
tags:
  medium: [pixel, voxel, hybrid]
  palette: [extended, ramps, earthtone]
  era: [modern_retro, contemporary]
  mood: [cozy, playful, nostalgic]
